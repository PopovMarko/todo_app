      description:
        $ref: '#/definitions/github_com_PopovMarko_todo_app_internal_core_transport_http_types.Nullable-string'
      title:
        $ref: '#/definitions/github_com_PopovMarko_todo_app_internal_core_transport_http_types.Nullable-string'
    type: object
  internal_features_tasks_transport_http.TaskDTOResponse:
    properties:
      author_user_id:
        type: integer
      completed:
        type: boolean
      completed_at:
        type: string
      created_at:
        type: string
      description:
        type: string
      task_id:
        type: integer
      title:
        type: string
      version:
        type: integer
    type: object
  internal_features_users_transport_http.GetUserResponse:
    properties:
      full_name:
        example: John Doe
        type: string
      id:
        example: 10
        type: integer
      phone_number:
        example: "+380675640000"
        type: string
      version:
        example: 3
        type: integer
    type: object
  internal_features_users_transport_http.PatchUserRequest:
    properties:
      full_name:
        example: Johne
        type: string
      phone_number:
        example: "+3805640000"
        type: string
    type: object
  internal_features_users_transport_http.PatchUserResponse:
    properties:
      full_name:
        example: John Doe
        type: string
      id:
        example: 10
        type: integer
      phone_number:
        example: "+380675640000"
        type: string
      version:
        example: 3
        type: integer
    type: object
  internal_features_users_transport_http.UserDTORequest:
    properties:
      full_name:
        example: John Doe
        maxLength: 100
        minLength: 3
        type: string
      phone_number:
        example: "+380675640000"
        maxLength: 15
        minLength: 10
