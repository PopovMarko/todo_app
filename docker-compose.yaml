---
services:
  todoapp:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/todo/Dockerfile
    container_name: todoapp
    environment:
      HTTP_ADDRESS: :5050
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT}
      POSTGRES_HOST: todoapp-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_TIMEOUT: 30s
      LOGGER_LEVEL: DEBUG
      LOGGER_FOLDER: /app/out/logs
    volumes: ['${PROJECT_ROOT}/app/out/logs:/app/out/logs']
    restart: always
    ports: [5050:5050]
  todoapp-postgres:
    image: postgres:18.3-bookworm
    container_name: todoapp-env-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: ['${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql']
    restart: always
  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes: ['${PROJECT_ROOT}/migrations:/migrations']
  todoapp-postgres-port-forwarder:
    image: alpine/socat:latest
    container_name: port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432
    ports: [127.0.0.1:5432:5432]
